<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Message</title>

<style>
body{
    background:#111;
    color:#00ff00;
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:120px;
}

button{
    padding:12px 30px;
    font-size:18px;
    cursor:pointer;
}

#msg{
    margin-top:30px;
    font-size:22px;
}
</style>

</head>

<body>

<h2>"Click to Continue"</h2>

<button onclick="start()">Click Here</button>

<p id="msg"></p>

<script>

function start(){

let messages = [
"Scanning your device...",
"Checking system files...",
"Analyzing data...",
"Preparing special message..."
];

let i = 0;

let text = document.getElementById("msg");

let interval = setInterval(function(){

text.innerHTML = messages[i];

i++;

if(i === messages.length){

clearInterval(interval);

setTimeout(function(){

text.innerHTML = "\"Eid Mubarak My Sweet Heart\"";

},2000);

}

},2000);

}

</script>

</body>
</html>
